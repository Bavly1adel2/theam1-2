{{#> layouts/base}}
  {{> components/nav}}
  <main id="main">
      <section class="section">
        <div class="container">
          <div class="mx-auto max-w-md">
            <div class="glass rounded-3xl p-6 md:p-8">
              <h1 class="text-2xl font-extrabold tracking-tight">Welcome back</h1>
              <p class="mt-2 text-sm text-ink-300">Sign in to access your dashboard.</p>

              <form class="mt-6 grid gap-4">
                <div>
                  <label class="text-sm font-semibold" for="email">Email</label>
                  <input class="input mt-2" id="email" type="email" autocomplete="email" placeholder="you@company.com" />
                </div>
                <div>
                  <label class="text-sm font-semibold" for="password">Password</label>
                  <input class="input mt-2" id="password" type="password" autocomplete="current-password" placeholder="••••••••" />
                </div>
                <div class="flex items-center justify-between">
                  <label class="inline-flex items-center gap-2 text-sm text-ink-300">
                    <input type="checkbox" class="rounded border-white/10 bg-white/5" />
                    Remember me
                  </label>
                  <a class="text-sm font-semibold text-secondary hover:text-secondary/90" href="contact.html">Forgot?</a>
                </div>
                <button class="btn-primary w-full" type="button">Sign in</button>
              </form>

              <p class="mt-6 text-sm text-ink-300">
                New here? <a class="font-semibold text-secondary hover:text-secondary/90" href="register.html">Create an account</a>
              </p>
            </div>
          </div>
        </div>
      </section>
  </main>
  {{> components/footer}}
{{/layouts/base}}
